<style>
  :root {
    --peri: #7086CF;
    --peri-deep: #5A6FB8;
    --peri-dark: #45578F;
    --peri-night: #303D66;
    --peri-soft: #E9EDFA;
    --peri-mist: #F3F5FC;
    --paper: #FAFAF7;
    --card: #FFFFFF;
    --ink: #2B3147;
    --ink-soft: #6B7390;
    --line: #E3E6F2;
    --green: #2F8F62;
    --green-soft: #E2F3EA;
    --amber: #C98A1B;
    --amber-soft: #FBF1DC;
    --gray: #8A90A3;
    --gray-soft: #EEEFF4;
    --red: #C24A4A;
    --red-soft: #FAE7E7;
    --radius: 18px;
    --shadow: 0 1px 2px rgba(48,61,102,.06), 0 8px 24px rgba(48,61,102,.07);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Manrope', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    overscroll-behavior-y: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* ---------- HERO (компактний) ---------- */
  .hero {
    background:
      radial-gradient(900px 300px at 85% -40%, rgba(255,255,255,.14), transparent 60%),
      radial-gradient(600px 260px at -10% 140%, rgba(48,61,102,.35), transparent 55%),
      var(--peri);
    color: #fff;
    padding: calc(12px + env(safe-area-inset-top)) clamp(16px, 4vw, 48px) 13px;
    position: relative;
    overflow: hidden;
    position: sticky; top: 0; z-index: 50;
  }
  .hero-top {
    display: flex; align-items: center; gap: 12px;
    max-width: 1180px; margin: 0 auto;
    position: relative; z-index: 1;
  }
  .logo {
    width: 42px; height: 42px; border-radius: 12px;
    box-shadow: 0 4px 12px rgba(48,61,102,.35);
    flex: 0 0 auto;
  }
  .hero-titles { flex: 1 1 auto; min-width: 0; }
  .brand {
    font-family: 'Cormorant', serif;
    font-size: 25px;
    font-weight: 600;
    letter-spacing: .5px;
    line-height: 1.02;
  }
  .subtitle {
    margin-top: 1px;
    font-size: 10.5px; font-weight: 600;
    letter-spacing: .13em; text-transform: uppercase;
    opacity: .85;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .updated {
    font-size: 11.5px; opacity: .85;
    text-align: right; line-height: 1.4;
    flex: 0 0 auto;
    cursor: pointer;
    user-select: none; -webkit-user-select: none;
  }
  .updated b { font-size: 13px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- PULL-TO-REFRESH ---------- */
  .ptr {
    position: fixed;
    top: calc(6px + env(safe-area-inset-top));
    left: 50%;
    width: 42px; height: 42px;
    margin-left: -21px;
    border-radius: 50%;
    background: #fff;
    border: 1px solid var(--line);
    box-shadow: 0 6px 18px rgba(48,61,102,.22);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    transform: translateY(-64px);
    opacity: 0;
    pointer-events: none;
    transition: none;
  }
  .ptr svg { width: 19px; height: 19px; color: var(--peri-deep); transition: transform .15s; }
  .ptr.armed svg { transform: rotate(180deg); color: var(--green); }
  .ptr.spinning svg { animation: spin .8s linear infinite; color: var(--peri-deep); }
  .ptr.retract { transition: transform .3s cubic-bezier(.3,.7,.4,1), opacity .3s; }

  /* ---------- CONTENT ---------- */
  .content {
    max-width: 1180px;
    margin: 8px auto 0;
    padding: 0 clamp(18px, 4vw, 48px) 56px;
    position: relative; z-index: 2;
  }

  /* stat cards */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(215px, 1fr));
    gap: 16px;
  }
  .stat {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px 22px 18px;
    opacity: 0;
    animation: rise .55s cubic-bezier(.2,.7,.3,1) forwards;
  }
  .stat:nth-child(2) { animation-delay: .07s; }
  .stat:nth-child(3) { animation-delay: .14s; }
  .stat:nth-child(4) { animation-delay: .21s; }
  @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

  .stat-label {
    font-size: 11.5px; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase;
    color: var(--ink-soft);
    display: flex; align-items: center; gap: 7px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; }
  .stat-value {
    font-family: 'Cormorant', serif;
    font-size: 46px; font-weight: 700;
    line-height: 1.05; margin-top: 8px;
    color: var(--peri-night);
    font-variant-numeric: lining-nums;
  }
  .stat-hint { font-size: 12.5px; color: var(--ink-soft); margin-top: 3px; }
  .stat.primary {
    background: linear-gradient(150deg, var(--peri-night), var(--peri-dark) 75%);
    border-color: transparent;
    color: #fff;
  }
  .stat.primary .stat-label { color: rgba(255,255,255,.75); }
  .stat.primary .stat-value { color: #fff; }
  .stat.primary .stat-hint { color: rgba(255,255,255,.65); }

  /* sections */
  .section { margin-top: 18px; }
  .section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 14px; flex-wrap: wrap; margin-bottom: 14px;
  }
  h2 {
    font-family: 'Cormorant', serif;
    font-size: 27px; font-weight: 600;
    color: var(--peri-night);
  }
  .section-note { font-size: 12.5px; color: var(--ink-soft); }

  /* ready-to-ship table */
  .panel {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; font-size: 15px; }
  thead th {
    text-align: left;
    font-size: 11px; font-weight: 800;
    letter-spacing: .1em; text-transform: uppercase;
    color: var(--ink-soft);
    background: var(--peri-mist);
    padding: 11px 20px;
    border-bottom: 1px solid var(--line);
  }
  tbody td {
    padding: 13px 20px;
    border-bottom: 1px solid var(--line);
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { transition: background .15s; }
  tbody tr:hover { background: var(--peri-mist); }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.num { font-weight: 600; }
  .muted-num { color: #4A5470; }
  .variety {
    font-family: 'Manrope', sans-serif;
    font-size: 15.5px; font-weight: 700;
    letter-spacing: .01em;
    color: var(--peri-night);
  }
  .art {
    font-size: 13px; font-weight: 600;
    color: #5C657F;
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }
  .qty-ready { font-weight: 800; font-size: 16.5px; color: var(--green); }
  .qty-zero { color: var(--gray); font-weight: 600; }
  .qty-neg { color: var(--red); font-weight: 800; }
  tfoot td {
    padding: 13px 20px;
    background: var(--peri-mist);
    border-top: 1px solid var(--line);
    font-weight: 800;
  }

  /* status grid */
  .chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    font-family: 'Manrope', sans-serif;
    font-size: 12.5px; font-weight: 700;
    padding: 7px 14px; border-radius: 999px;
    cursor: pointer;
    transition: all .15s;
  }
  .chip:hover { border-color: var(--peri); color: var(--peri-dark); }
  .chip.active { background: var(--peri-night); border-color: var(--peri-night); color: #fff; }
  .chip .cnt { opacity: .65; margin-left: 4px; }

  .status-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(265px, 1fr));
    gap: 13px;
    margin-top: 16px;
  }
  .pcard {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 15px;
    box-shadow: var(--shadow);
    padding: 16px 18px 15px;
    position: relative;
    overflow: hidden;
    transition: transform .18s, box-shadow .18s;
  }
  .pcard:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(48,61,102,.08), 0 14px 30px rgba(48,61,102,.12); }
  .pcard::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: var(--accent, var(--gray));
  }
  .pcard-row {
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 12px;
  }
  .pcard-main {
    display: flex; align-items: flex-start; gap: 12px;
    min-width: 0; flex: 1 1 auto;
  }
  .pcard-photo {
    width: 56px; height: 56px;
    border-radius: 12px;
    object-fit: cover;
    flex: 0 0 auto;
    background: var(--peri-mist);
    border: 1px solid var(--line);
    cursor: zoom-in;
    transition: transform .15s;
  }
  .pcard-photo:active { transform: scale(.96); }

  /* ---------- LIGHTBOX ---------- */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(20, 25, 45, .88);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: none;
    align-items: center; justify-content: center;
    z-index: 200;
    padding: max(20px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom));
    opacity: 0;
    transition: opacity .2s;
  }
  .lightbox.open { display: flex; opacity: 1; }
  .lightbox img {
    max-width: 100%;
    max-height: 100%;
    border-radius: 14px;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
    object-fit: contain;
    cursor: zoom-out;
    transform: scale(.96);
    transition: transform .2s;
  }
  .lightbox.open img { transform: scale(1); }
  .lightbox-close {
    position: absolute;
    top: max(14px, env(safe-area-inset-top));
    right: 14px;
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,.15);
    border: none;
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .lightbox-close:hover { background: rgba(255,255,255,.25); }
  .pcard-text { min-width: 0; flex: 1 1 auto; }
  .pcard .variety { font-size: 16.5px; line-height: 1.25; }
  .pcard .art { margin-top: 2px; }
  .ready-num {
    text-align: right; flex: 0 0 auto;
    font-variant-numeric: tabular-nums;
  }
  .ready-num b {
    display: block;
    font-size: 27px; font-weight: 800;
    line-height: 1; color: var(--green);
    letter-spacing: -.01em;
  }
  .ready-num span {
    font-size: 10.5px; font-weight: 700;
    letter-spacing: .09em; text-transform: uppercase;
    color: var(--ink-soft);
  }
  .ready-num.zero b { color: #C2C6D4; }
  .ready-num.neg b { color: var(--red); }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11.5px; font-weight: 800;
    letter-spacing: .04em;
    padding: 5px 11px; border-radius: 999px;
    margin-top: 11px;
  }
  .badge-row {
    display: flex; align-items: center;
    justify-content: space-between; gap: 8px; flex-wrap: wrap;
  }
  .buffer-pill {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 800;
    padding: 5px 11px; border-radius: 999px;
    margin-top: 11px;
    background: var(--peri-soft); color: var(--peri-dark);
    border: 1px dashed var(--peri);
    font-variant-numeric: tabular-nums;
  }
  .buffer-pill svg { width: 12px; height: 12px; }
  .badge .dot { width: 7px; height: 7px; }
  .b-cut    { background: var(--green-soft); color: var(--green); }
  .b-later  { background: var(--amber-soft); color: var(--amber); }
  .b-done   { background: var(--gray-soft);  color: var(--gray); }
  .b-none   { background: var(--peri-soft);  color: var(--peri-deep); }
  .pcard.dimmed { opacity: .62; }

  /* states */
  .state {
    text-align: center;
    padding: 70px 24px;
    color: var(--ink-soft);
    font-size: 15px;
  }
  .state .flower {
    font-family: 'Cormorant', serif;
    font-size: 40px; color: var(--peri);
    display: block; margin-bottom: 8px;
  }
  .error-box {
    background: var(--red-soft);
    border: 1px solid #EAC4C4;
    color: #8C3030;
    border-radius: var(--radius);
    padding: 18px 22px;
    font-size: 14px;
    line-height: 1.55;
    display: none;
    margin-top: 24px;
  }
  .error-box.show { display: block; }
  .error-box strong { display: block; margin-bottom: 4px; }

  /* ---------- HINT ---------- */
  .hint {
    display: flex; align-items: center; gap: 10px;
    background: var(--peri-soft);
    border: 1px solid #D6DEF5;
    color: var(--peri-dark);
    border-radius: 12px;
    padding: 9px 14px;
    margin-top: 12px;
    font-size: 13px;
    line-height: 1.4;
  }
  .hint svg { width: 16px; height: 16px; flex: 0 0 auto; color: var(--peri-deep); }
  .hint-text { flex: 1 1 auto; }
  .hint-close {
    background: none; border: none; cursor: pointer;
    color: var(--peri-dark); opacity: .6;
    padding: 4px; margin: -4px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .hint-close:hover { opacity: 1; }
  .hint.hidden { display: none; }

  .skeleton { animation: pulse 1.3s ease-in-out infinite; background: var(--gray-soft); border-radius: 8px; color: transparent !important; }
  @keyframes pulse { 0%,100% { opacity: .55; } 50% { opacity: 1; } }

  footer {
    text-align: center;
    padding: 26px 18px 40px;
    color: var(--ink-soft);
    font-size: 12.5px;
  }
  footer .mark { font-family: 'Cormorant', serif; font-style: italic; font-size: 15px; color: var(--peri-deep); }

  @media (max-width: 640px) {
    .brand { font-size: 22px; }
    .logo { width: 38px; height: 38px; border-radius: 11px; }
    .status-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

<script>
const API_KEY = 'AIzaSyAeFU5uOUoRvsZL1mXhovlQJ0emfXAPDtk';
const SPREADSHEET_ID = '1yj_tjje15LFPr6uydZqU7noQ10DHcv245Ms6P_HZMZs';

// Діапазони: заголовки на облікових аркушах у рядку 2, дані з рядка 3.
// «Довідник» — заголовки в рядку 1, дані з рядка 2.
const RANGES = {
  catalog: "'Довідник'!A2:B",
  status:  "'Поле Брат'!H3:J",
  field:   "'Поле Брат'!A3:F",
  stock:   "'Запас'!A3:F",
  shipped: "'Вигрузка'!A3:D"
};

const STATUS_META = {
  'Зрізають':     { cls: 'b-cut',   color: 'var(--green)', order: 0 },
  'Буде пізніше': { cls: 'b-later', color: 'var(--amber)', order: 1 },
  'Більше нема на полі':  { cls: 'b-done',  color: 'var(--gray)',  order: 2, dim: true },
  'Без статусу':  { cls: 'b-none',  color: 'var(--peri)',  order: 3 }
};

const PHOTOS = {
  'sarah bernhardt':     'https://florium.ua/media/catalog/product/cache/2/file/9df78eab33525d08d6e5fb8d27136e95/s/a/sara_-_1.webp',
  'shirley temple':      'https://florium.ua/media/catalog/product/cache/2/file/9df78eab33525d08d6e5fb8d27136e95/s/h/shirley_temple_1_2.webp',
  'gardenia':            'https://florium.ua/media/catalog/product/cache/2/file/9df78eab33525d08d6e5fb8d27136e95/2/_/2_3_2.webp',
  'class act':           'https://florium.ua/media/catalog/product/cache/2/file/9df78eab33525d08d6e5fb8d27136e95/c/l/class_act_-_1.webp',
  'monsieur jules elie': 'https://florium.ua/media/catalog/product/cache/2/file/9df78eab33525d08d6e5fb8d27136e95/m/o/monsieur_jules_elie_1_2.webp',
  'henry sass':          'https://florium.ua/media/catalog/product/cache/2/file/9df78eab33525d08d6e5fb8d27136e95/h/e/henry_-_1.webp',
  'alertie':             'https://florium.ua/media/catalog/product/cache/2/file/9df78eab33525d08d6e5fb8d27136e95/a/l/alertie_-_1.webp',
  'henry bockstoce':     'https://florium.ua/media/catalog/product/cache/2/file/9df78eab33525d08d6e5fb8d27136e95/h/e/henry_bockstoce_1_2.webp',
  'coral charm':         'https://florium.ua/media/catalog/product/cache/2/file/9df78eab33525d08d6e5fb8d27136e95/c/o/coral_charm_1_1.webp',
  'florence nicholls':   'https://florium.ua/media/catalog/product/cache/2/file/9df78eab33525d08d6e5fb8d27136e95/f/l/florence_-_1.webp',
  'command performance': 'https://florium.ua/media/catalog/product/cache/2/file/9df78eab33525d08d6e5fb8d27136e95/c/o/comand_performance_1_2.webp',
  'sunny boy':           'https://florium.ua/media/catalog/product/cache/2/file/9df78eab33525d08d6e5fb8d27136e95/s/u/sunny_boy_1__2.webp',
  'sunny girl':          'https://florium.ua/media/catalog/product/cache/2/file/9df78eab33525d08d6e5fb8d27136e95/s/u/sunny_girl_1__3.webp'
};
const normName = s => String(s ?? '').toLowerCase().replace(/[ʼ'`’]/g, '').replace(/\s+/g, ' ').trim();
const photoFor = name => PHOTOS[normName(name)] || null;

let statusData = [];
let activeFilter = 'all';

const $ = id => document.getElementById(id);
const fmt = n => new Intl.NumberFormat('uk-UA').format(n);
const toNum = v => {
  if (v === undefined || v === null || v === '') return 0;
  const n = parseFloat(String(v).replace(/\s/g, '').replace(',', '.'));
  return isNaN(n) ? 0 : n;
};
const esc = s => String(s ?? '').replace(/[&<>"']/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

async function loadData() {
  ptrSpin(true);
  $('errorBox').classList.remove('show');

  try {
    const params = Object.values(RANGES)
      .map(r => 'ranges=' + encodeURIComponent(r)).join('&');
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values:batchGet?${params}&key=${API_KEY}`;

    const res = await fetch(url);
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      throw new Error(body?.error?.message || `HTTP ${res.status}`);
    }
    const data = await res.json();
    const [catalogR, statusR, fieldR, stockR, shippedR] =
      data.valueRanges.map(vr => vr.values || []);

    // --- Довідник: артикул → назва
    const names = {};
    catalogR.forEach(r => { if (r[0]) names[String(r[0]).trim()] = (r[1] || '').trim(); });

    // нормалізація штрихкоду (буває текстом і числом)
    const bc = v => {
      const d = String(v ?? '').replace(/\D/g, '');
      return d || String(v ?? '').trim();
    };

    // --- Запас та Вигрузка → готово до відправки
    const stock = {}, shipped = {};
    const stockBarcodes = new Set();
    stockR.forEach(r => {
      const art = String(r[0] || '').trim();
      if (!art) return;
      stock[art] = (stock[art] || 0) + toNum(r[2]);   // C = К-сть
      const code = bc(r[1]);                           // B = Штрихкод
      if (code) stockBarcodes.add(code);
    });
    shippedR.forEach(r => {
      const art = String(r[0] || '').trim();
      if (art) shipped[art] = (shipped[art] || 0) + toNum(r[1]); // B = К-сть
    });

    // --- Буфер «Чистять»: зрізано на полі, але ящик (штрихкод) ще не зʼявився в Запасі
    const buffer = {};
    fieldR.forEach(r => {
      const art = String(r[0] || '').trim();
      if (!art) return;
      const code = bc(r[1]);
      if (code && stockBarcodes.has(code)) return; // ящик уже почищений і в запасі
      buffer[art] = (buffer[art] || 0) + toNum(r[2]); // C = К-сть
    });


    // --- Статуси (дедуп по артикулу, останній запис перемагає)
    const statusMap = new Map();
    statusR.forEach(r => {
      const art = String(r[0] || '').trim();
      if (!art) return;
      statusMap.set(art, {
        art,
        name: (r[1] || '').trim() || names[art] || '—',
        status: (r[2] || '').trim() || 'Без статусу'
      });
    });
    // --- Обʼєднання: всі артикули зі статусів + склад + поле
    const arts = [...new Set([
      ...statusMap.keys(),
      ...Object.keys(stock),
      ...Object.keys(shipped),
      ...Object.keys(buffer)
    ])];

    statusData = arts.map(art => {
      const st = statusMap.get(art);
      return {
        art,
        name: (st && st.name) || names[art] || '—',
        status: (st && st.status) || 'Без статусу',
        ready: (stock[art] || 0) - (shipped[art] || 0),
        buffer: buffer[art] || 0
      };
    }).sort((a, b) => {
      if (b.ready !== a.ready) return b.ready - a.ready;      // найбільше готового — вгорі
      if (b.buffer !== a.buffer) return b.buffer - a.buffer;  // далі — у кого більше чистять
      const oa = (STATUS_META[a.status] || STATUS_META['Без статусу']).order;
      const ob = (STATUS_META[b.status] || STATUS_META['Без статусу']).order;
      return oa - ob || a.name.localeCompare(b.name, 'uk');
    });

    renderChips(statusData);
    renderStatusGrid();

    $('updatedAt').innerHTML = 'Оновлено<br><b>' +
      new Date().toLocaleTimeString('uk-UA', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) + '</b>';
  } catch (err) {
    $('errorMsg').textContent = err.message +
      ' — перевірте доступ до таблиці, API-ключ та його обмеження в Google Cloud Console.';
    $('errorBox').classList.add('show');
    $('updatedAt').textContent = 'Помилка завантаження';
  } finally {
    ptrSpin(false);
  }
}

/* ---------- Pull-to-refresh (свайп вниз, для PWA на iOS) ---------- */
const ptr = $('ptr');
const PTR_THRESHOLD = 70;   // px тягнути, щоб спрацювало
const PTR_MAX = 105;
let ptrStartY = 0, ptrPulling = false, ptrDist = 0, ptrBusy = false;

function ptrSpin(on) {
  ptrBusy = on;
  if (on) {
    ptr.classList.remove('retract', 'armed');
    ptr.classList.add('spinning');
    ptr.style.opacity = '1';
    ptr.style.transform = 'translateY(' + (PTR_THRESHOLD - 10) + 'px)';
  } else {
    ptr.classList.add('retract');
    ptr.classList.remove('spinning', 'armed');
    ptr.style.opacity = '0';
    ptr.style.transform = 'translateY(-64px)';
  }
}

document.addEventListener('touchstart', e => {
  if (ptrBusy || window.scrollY > 0) return;
  ptrStartY = e.touches[0].clientY;
  ptrPulling = true;
  ptrDist = 0;
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (!ptrPulling || ptrBusy) return;
  ptrDist = e.touches[0].clientY - ptrStartY;
  if (ptrDist <= 0 || window.scrollY > 0) {
    ptr.style.opacity = '0';
    return;
  }
  const d = Math.min(ptrDist * 0.45, PTR_MAX);
  ptr.classList.remove('retract');
  ptr.style.opacity = Math.min(d / 36, 1);
  ptr.style.transform = 'translateY(' + d + 'px) rotate(' + d * 2.2 + 'deg)';
  ptr.classList.toggle('armed', d >= PTR_THRESHOLD);
}, { passive: true });

document.addEventListener('touchend', () => {
  if (!ptrPulling || ptrBusy) { ptrPulling = false; return; }
  ptrPulling = false;
  const d = Math.min(Math.max(ptrDist, 0) * 0.45, PTR_MAX);
  if (d >= PTR_THRESHOLD) {
    loadData();                 // ptrSpin(true) всередині
  } else {
    ptr.classList.add('retract');
    ptr.classList.remove('armed');
    ptr.style.opacity = '0';
    ptr.style.transform = 'translateY(-64px)';
  }
});

function renderChips(list) {
  const order = ['all', 'available', 'cleaning', 'Зрізають', 'Буде пізніше', 'Більше нема на полі'];
  const labels = { all: 'Усі', available: 'Є в наявності', cleaning: 'Чистять' };
  const counts = {
    all: list.length,
    available: list.filter(v => v.ready > 0).length,
    cleaning: list.filter(v => v.buffer > 0).length
  };
  list.forEach(v => counts[v.status] = (counts[v.status] || 0) + 1);
  $('chips').innerHTML = order
    .filter(k => k === 'all' || counts[k])
    .map(k => `<button class="chip ${activeFilter === k ? 'active' : ''}" data-f="${esc(k)}">
       ${esc(labels[k] || k)}<span class="cnt">${counts[k] || 0}</span></button>`).join('');
  $('chips').querySelectorAll('.chip').forEach(ch =>
    ch.onclick = () => { activeFilter = ch.dataset.f; renderChips(statusData); renderStatusGrid(); });
}

function renderStatusGrid() {
  const list = activeFilter === 'all' ? statusData
    : activeFilter === 'available' ? statusData.filter(v => v.ready > 0)
    : activeFilter === 'cleaning' ? statusData.filter(v => v.buffer > 0)
    : statusData.filter(v => v.status === activeFilter);
  if (!list.length) {
    $('statusGrid').innerHTML =
      '<div class="state" style="grid-column:1/-1"><span class="flower">❀</span>Немає сортів за цим фільтром</div>';
    return;
  }
  $('statusGrid').innerHTML = list.map(v => {
    const m = STATUS_META[v.status] || STATUS_META['Без статусу'];
    const numCls = v.ready > 0 ? '' : v.ready < 0 ? ' neg' : ' zero';
    const dim = m.dim && v.ready <= 0 && v.buffer <= 0 && activeFilter === 'all' ? ' dimmed' : '';
    const bufferPill = v.buffer > 0
      ? `<span class="buffer-pill">
           <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.2 2.2M16.2 16.2l2.2 2.2M5.6 18.4l2.2-2.2M16.2 7.8l2.2-2.2"/></svg>
           Чистять · ${fmt(v.buffer)} шт</span>`
      : '';
    const photo = photoFor(v.name);
    const photoEl = photo
      ? `<img class="pcard-photo" src="${esc(photo)}" alt="${esc(v.name)}" loading="lazy">`
      : '';
    return `<div class="pcard${dim}" style="--accent:${m.color}">
      <div class="pcard-row">
        <div class="pcard-main">
          ${photoEl}
          <div class="pcard-text">
            <div class="variety">${esc(v.name)}</div>
            <div class="art">арт. ${esc(v.art)}</div>
          </div>
        </div>
        <div class="ready-num${numCls}">
          <b>${fmt(v.ready)}</b>
          <span>готово, шт</span>
        </div>
      </div>
      <div class="badge-row">
        <span class="badge ${m.cls}"><span class="dot" style="background:currentColor"></span>${esc(v.status)}</span>
        ${bufferPill}
      </div>
    </div>`;
  }).join('');
}

/* ---------- Photo hint ---------- */
const photoHint = $('photoHint');
if (localStorage.getItem('peonita.photoHintHidden') === '1') {
  photoHint.classList.add('hidden');
}
$('hintClose').addEventListener('click', () => {
  photoHint.classList.add('hidden');
  localStorage.setItem('peonita.photoHintHidden', '1');
});

/* ---------- Lightbox ---------- */
const lightbox = $('lightbox');
const lightboxImg = $('lightboxImg');

function openLightbox(src, alt) {
  lightboxImg.src = src;
  lightboxImg.alt = alt || '';
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(() => { lightboxImg.src = ''; }, 200);
}

document.addEventListener('click', e => {
  const photo = e.target.closest('.pcard-photo');
  if (photo) {
    e.stopPropagation();
    openLightbox(photo.src, photo.alt);
  }
});
lightbox.addEventListener('click', e => {
  if (e.target === lightbox || e.target.id === 'lightboxClose' || e.target === lightboxImg) closeLightbox();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && lightbox.classList.contains('open')) closeLightbox();
});

loadData();
setInterval(loadData, 120000); // автооновлення кожні 2 хв
</script>
